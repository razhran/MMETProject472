<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر الهيدروليك - الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="ar">
    <header class="main-header">
        <div class="header-content">
            <div class="logo-area">
                <h2 class="lang" data-ar="مسجل بيانات التجربة" data-en="Exp. Data Logger">مسجل بيانات التجربة</h2>
            </div>
            <nav class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link active lang" data-ar="الرئيسية" data-en="Home">الرئيسية</a>
                <a href="advanced.html" class="nav-link lang" data-ar="التحليل المتقدم" data-en="Advanced">التحليل المتقدم</a>
                <button class="lang-toggle" onclick="toggleLang()">EN / AR</button>
            </nav>
            <div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
        </div>
    </header>

<main class="dashboard-container">
    <div class="control-panel">
        <div class="card settings-card">
            <div class="card-header"><h4>⚙️ إعدادات التجربة</h4></div>
            <div class="card-body">
                <div class="input-group">
                    <label>اسم الزيت:</label>
                    <select id="oilType">
                        <option value="ISO VG 32">ISO VG 32</option>
                        <option value="ISO VG 46">ISO VG 46</option>
                        <option value="ISO VG 68">ISO VG 68</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>الحرارة (°C):</label>
                    <input type="number" id="currentTemp" value="25">
                </div>
            </div>
        </div>

        <div class="card timer-card">
            <div class="card-header"><h4>⏱️ المؤقت</h4></div>
            <div class="card-body">
                <div id="timerDisplay">00:00.00</div>
                <div class="control-btns">
                    <button class="btn-start" onclick="startTimer()">Start</button>
                    <button class="btn-stop" onclick="stopTimer()">Stop</button>
                    <button class="btn-reset" onclick="resetTimer()">Reset</button>
                </div>
            </div>
        </div>

        <div class="card counter-card">
            <div class="card-header"><h4>🔢 العداد</h4></div>
            <div class="card-body">
                <div id="strokeDisplay">0</div>
                <button class="btn-plus" onclick="addStroke()">+1 Stroke</button>
                <button class="btn-reset-link" onclick="resetCounter()">Reset Count</button>
            </div>
        </div>
    </div>

    <div class="card log-card">
        <div class="card-header">
            <h4>📋 سجل البيانات الميدانية</h4>
            <div class="table-actions">
                <button class="btn-copy" onclick="copyTable()">📋 نسخ لللصق</button>
                <button class="btn-excel" onclick="exportToExcel()">📊 Export Excel</button>
            </div>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table id="mainLogTable">
                    <thead>
                        <tr>
                            <th>الزيت</th>
                            <th>الضخات</th>
                            <th>الزمن</th>
                            <th>الحرارة</th>
                            <th>معدل التدفق</th>
                        </tr>
                    </thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
            <button class="btn-save-main" onclick="saveToLog()">💾 حفظ القراءة الحالية في السجل</button>
        </div>
    </div>
</main>

<script> 
function copyTable() {
    const table = document.getElementById("mainLogTable");
    if (table.rows.length <= 1) {
        alert("سجل بيانات أول عشان ننسخها!");
        return;
    }

    const range = document.createRange();
    range.selectNode(table);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    
    try {
        document.execCommand("copy");
        alert("✅ تم نسخ الجدول! روح للإكسل وسو Paste (Ctrl+V) مباشرة.");
    } catch (err) {
        alert("❌ المتصفح رفض النسخ التلقائي.");
    }
    window.getSelection().removeAllRanges();
}
</script>

    <footer class="main-footer">
        <p class="lang" data-ar="تم إنشاء الأدوات لمشروع تأثير لزوجة الزيت 2026" data-en="Oil Viscosity Project 2026">تم إنشاء الأدوات لمشروع تأثير لزوجة الزيت 2026</p>
        <div class="project-code">MMET472 Project</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
