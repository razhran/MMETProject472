<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر الهيدروليك - الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="ar">
<header class="main-header">
    <nav class="navbar">
        <div class="nav-container">
            <div class="brand-area">
                <span class="project-id lang" data-ar="MMET 472" data-en="MMET 472">MMET 472</span>
                <h1 class="page-title lang" data-ar="القياسات العملية" data-en="lab Measurements">القياسات العملية</h1>
            </div>

            <div class="nav-actions">
                <ul class="nav-links" id="nav-list">
                    <li><a href="index.html" class="nav-link lang active" data-ar="الرئيسية" data-en="Home">الرئيسية</a></li>
                    <li><a href="advanced.html" class="nav-link lang" data-ar="التحليل المتقدم" data-en="Advanced Analysis">التحليل المتقدم</a></li>
                    <li><a href="#sources" class="nav-link lang" data-ar="المصادر" data-en="Sources">المصادر</a></li>
                </ul>

                <button id="lang-btn" class="lang-switch-btn" onclick="toggleLang()">EN</button>

                <button class="menu-toggle" id="mobile-menu">
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
                </button>
            </div>
        </div>
    </nav>
</header>

<main class="dashboard-container">
<div class="control-panel">
    <div class="card settings-card">
        <div class="card-header">
            <h4 class="lang" data-ar="⚙️ إعدادات التجربة" data-en="⚙️ Experiment Settings">⚙️ إعدادات التجربة</h4>
        </div>
        <div class="card-body">
            <div class="input-group">
                <label class="lang" data-ar="اسم الزيت:" data-en="Oil Name:">اسم الزيت:</label>
                <select id="oilType">
                    <option value="ISO VG 32">ISO VG 32</option>
                    <option value="ISO VG 37">ISO VG 37</option>
                    <option value="ISO VG 68">ISO VG 68</option>
                </select>
            </div>
            <div class="input-group">
                <label class="lang" data-ar="الحرارة (°C):" data-en="Temperature (°C):">الحرارة (°C):</label>
                <input type="number" id="currentTemp" value="25">
            </div>
        </div>
    </div>

    <div class="card timer-card">
        <div class="card-header">
            <h4 class="lang" data-ar="⏱️ المؤقت الرقمي" data-en="⏱️ Digital Timer">⏱️ المؤقت الرقمي</h4>
        </div>
        <div class="card-body">
            <div id="timerDisplay">00:00.00</div>
            <div class="control-btns">
                <button class="btn-start lang" data-ar="ابدأ" data-en="Start" onclick="startTimer()">ابدأ</button>
                <button class="btn-stop lang" data-ar="إيقاف" data-en="Stop" onclick="stopTimer()">إيقاف</button>
                <button class="btn-reset lang" data-ar="تصفير" data-en="Reset" onclick="resetTimer()">تصفير</button>
            </div>
        </div>
    </div>

    <div class="card counter-card">
        <div class="card-header">
            <h4 class="lang" data-ar="🔢 عداد الضخات" data-en="🔢 Stroke Counter">🔢 عداد الضخات</h4>
        </div>
        <div class="card-body">
            <div id="strokeDisplay">0</div>
            <button class="btn-plus lang" data-ar="+1 ضخة" data-en="+1 Stroke" onclick="addStroke()">+1 ضخة</button>
            <button class="btn-reset-link lang" data-ar="تصفير العداد" data-en="Reset Count" onclick="resetCounter()">تصفير العداد</button>
        </div>
    </div>
</div>

    <div class="card log-card">
    <div class="card-header">
        <h4 class="lang" data-ar="📋 سجل البيانات الميدانية" data-en="📋 Field Data Log">📋 سجل البيانات الميدانية</h4>
        <div class="table-actions">
            <button class="btn-copy lang" data-ar="📋 نسخ لللصق" data-en="📋 Copy to Paste" onclick="copyTable()">📋 نسخ لللصق</button>
            <button class="btn-excel lang" data-ar="📊 تصدير Excel" data-en="📊 Export Excel" onclick="exportToExcel()">📊 تصدير Excel</button>
        </div>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table id="mainLogTable">
                <thead>
                    <tr>
                        <th class="lang" data-ar="الزيت" data-en="Oil">الزيت</th>
                        <th class="lang" data-ar="الضخات" data-en="Strokes">الضخات</th>
                        <th class="lang" data-ar="الزمن" data-en="Time">الزمن</th>
                        <th class="lang" data-ar="الحرارة" data-en="Temp">الحرارة</th>
                        <th class="lang" data-ar="معدل التدفق" data-en="Flow Rate">معدل التدفق</th>
                    </tr>
                </thead>
                <tbody id="logBody"></tbody>
            </table>
        </div>
        <button class="btn-save-main lang" data-ar="💾 حفظ القراءة الحالية في السجل" data-en="💾 Save Current Reading to Log" onclick="saveToLog()">💾 حفظ القراءة الحالية في السجل</button>
    </div>
</div>
</main>

<script> 
function copyTable() {
    const table = document.getElementById("mainLogTable");
    if (table.rows.length <= 1) {
        alert("make some measurements and save them to the log before copying the table.");
        return;
    }

    const range = document.createRange();
    range.selectNode(table);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    
    try {
        document.execCommand("copy");
        alert("✅ go to paste the table in Excel or any text editor!");
    } catch (err) {
        alert("❌ error copying the table. Please try copying manually.");
    }
    window.getSelection().removeAllRanges();
}
</script>

        <div class="project-code">MMET472 Project</div>

    <script src="script.js"></script>
</body>
</html>
