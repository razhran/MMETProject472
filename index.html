<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainBody">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر الهيدروليك - الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="ar">
    <header class="main-header">
        <div class="header-content">
            <div class="logo-area">
                <h2 class="lang" data-ar="مسجل بيانات التجربة" data-en="Exp. Data Logger">مسجل بيانات التجربة</h2>
            </div>
            <nav class="nav-menu" id="navMenu">
                <a href="index.html" class="nav-link active lang" data-ar="الرئيسية" data-en="Home">الرئيسية</a>
                <a href="advanced.html" class="nav-link lang" data-ar="التحليل المتقدم" data-en="Advanced">التحليل المتقدم</a>
                <button class="lang-toggle" onclick="toggleLang()">EN / AR</button>
            </nav>
            <div class="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
        </div>
    </header>

    <main class="dashboard-grid">
    <div class="card tool-card">
        <div class="card-header">
            <h3 class="lang" data-ar="إعدادات التجربة" data-en="Experiment Settings">إعدادات التجربة</h3>
        </div>
        <div class="card-body">
            <div class="input-row">
                <div class="input-field">
                    <label class="lang" data-ar="اسم الزيت:" data-en="Oil Name:">اسم الزيت:</label>
                    <select id="oilType">
                        <option value="ISO VG 32">ISO VG 32</option>
                        <option value="ISO VG 46">ISO VG 46</option>
                        <option value="ISO VG 68">ISO VG 68</option>
                    </select>
                </div>
                <div class="input-field">
                    <label class="lang" data-ar="الحرارة (°C):" data-en="Temp (°C):">الحرارة (°C):</label>
                    <input type="number" id="currentTemp" value="25">
                </div>
            </div>
        </div>
    </div>

    <div class="card tool-card">
        <div class="card-header">
            <h3 class="lang" data-ar="المؤقت الرقمي" data-en="Digital Timer">المؤقت الرقمي</h3>
        </div>
        <div class="card-body text-center">
            <div id="timerDisplay" class="timer-font">00:00.00</div>
            <div class="timer-actions">
                <button class="btn-start" onclick="startTimer()">Start</button>
                <button class="btn-stop" onclick="stopTimer()">Stop</button>
                <button class="btn-reset-small" onclick="resetTimer()">Reset</button>
            </div>
        </div>
    </div>

    <div class="card tool-card">
    <div class="card-header">
        <h3 class="lang" data-ar="عداد الضغطات" data-en="Stroke Counter">عداد الضغطات</h3>
    </div>
    <div class="card-body text-center">
        <div id="strokeDisplay" class="counter-font">0</div>
        
        <div class="counter-actions">
            <button class="action-btn count-up" onclick="addStroke()">+1 Stroke</button>
            <button class="action-btn reset-gray" onclick="resetCounter()">Reset</button>
        </div>
    </div>
</div>

    <div class="card table-card full-width">
        <div class="card-header">
            <h3 class="lang" data-ar="سجل البيانات الميدانية" data-en="Field Data Log">سجل البيانات الميدانية</h3>
            <button class="export-excel-btn" onclick="exportToExcel()">Export to Excel</button>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table id="mainLogTable">
                    <thead>
                        <tr>
                            <th class="lang" data-ar="الزيت" data-en="Oil">الزيت</th>
                            <th class="lang" data-ar="الضخات" data-en="Strokes">الضخات</th>
                            <th class="lang" data-ar="الزمن" data-en="Time">الزمن</th>
                            <th class="lang" data-ar="الحرارة" data-en="Temp">الحرارة</th>
                            <th class="lang" data-ar="معدل التدفق" data-en="Flow Rate">معدل التدفق</th>
                        </tr>
                    </thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
            <button class="save-btn-large" onclick="saveToLog()">حفظ القراءة الحالية</button>
        </div>
    </div>
</main>

    <footer class="main-footer">
        <p class="lang" data-ar="تم إنشاء الأدوات لمشروع تأثير لزوجة الزيت 2026" data-en="Oil Viscosity Project 2026">تم إنشاء الأدوات لمشروع تأثير لزوجة الزيت 2026</p>
        <div class="project-code">MMET472 Project</div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
